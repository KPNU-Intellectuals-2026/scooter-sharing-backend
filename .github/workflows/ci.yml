name: CI Code Check

on:
  push:
    branches: [ "main", "develop" ]

  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Крок 1: Отримати код
      - name: Checkout code
        uses: actions/checkout@v3

      # Крок 2: Встановити Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Крок 3: Встановити залежності
      - name: Install dependencies
        run: npm install

      # Крок 4: Запуск тестів
      - name: Run Tests
        run: echo "Simulating tests... OK!"